<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قوانين الفيزياء</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');

  :root{
    --bg:#1c2230;
    --bg-2:#222a3b;
    --chalk:#eef1f5;
    --chalk-dim:#aab3c5;
    --line:#37415a;

    --c-light:#ffd166;     /* الضوء */
    --c-motion:#4ecdc4;    /* الحركة */
    --c-electric:#ff6b6b;  /* الكهرباء */
    --c-heat:#ff9f6b;      /* الحرارة */
    --c-fluid:#7ec8ff;     /* السوائل والضغط */
    --c-energy:#b48bff;    /* الطاقة والشغل */
    --c-sound:#9be564;     /* الصوت */
    --c-mag:#ff8fd0;       /* المغناطيسية */
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    background:var(--bg);
    color:var(--chalk);
    font-family:'Cairo', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100%;
  }

  /* subtle chalkboard texture */
  body{
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.025) 0, transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(255,255,255,0.02) 0, transparent 45%);
  }

  header{
    padding:28px 20px 20px;
    text-align:center;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:var(--bg);
    z-index:50;
  }
  header h1{
    font-size:1.7rem;
    font-weight:800;
    letter-spacing:0.5px;
  }
  header .sub{
    color:var(--chalk-dim);
    font-size:0.85rem;
    margin-top:6px;
    font-weight:600;
  }

  /* search */
  .search-wrap{
    max-width:520px;
    margin:16px auto 0;
    position:relative;
  }
  .search-wrap input{
    width:100%;
    padding:12px 44px 12px 16px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--bg-2);
    color:var(--chalk);
    font-family:'Cairo', sans-serif;
    font-size:0.95rem;
    outline:none;
  }
  .search-wrap input::placeholder{color:var(--chalk-dim);}
  .search-wrap input:focus{border-color:#5b6b94;}
  .search-icon{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    color:var(--chalk-dim);
    font-size:1.1rem;
    pointer-events:none;
  }

  /* category nav */
  nav.cats{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:14px 16px 4px;
    max-width:900px;
    margin:0 auto;
    scrollbar-width:none;
  }
  nav.cats::-webkit-scrollbar{display:none;}
  nav.cats button{
    flex:0 0 auto;
    padding:8px 16px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--bg-2);
    color:var(--chalk-dim);
    font-family:'Cairo', sans-serif;
    font-weight:600;
    font-size:0.85rem;
    cursor:pointer;
    transition:all .15s ease;
    white-space:nowrap;
  }
  nav.cats button.active{
    color:#1c2230;
    border-color:transparent;
  }

  main{
    max-width:900px;
    margin:0 auto;
    padding:18px 16px 60px;
  }

  .section{
    margin-bottom:34px;
  }
  .section-title{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
    padding-bottom:8px;
    border-bottom:2px solid var(--line);
  }
  .section-title .dot{
    width:12px; height:12px;
    border-radius:50%;
    flex:0 0 auto;
  }
  .section-title h2{
    font-size:1.25rem;
    font-weight:800;
  }
  .section-title .count{
    margin-right:auto;
    color:var(--chalk-dim);
    font-size:0.8rem;
    font-weight:600;
  }

  .law-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
  }
  @media(min-width:680px){
    .law-grid{grid-template-columns:1fr 1fr;}
  }

  .law-card{
    background:var(--bg-2);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 16px 14px;
    border-right:4px solid transparent;
    transition:transform .12s ease, border-color .12s ease;
  }
  .law-card.hidden{display:none;}
  .law-card:active{transform:scale(0.98);}

  .law-name{
    font-weight:800;
    font-size:1.02rem;
    margin-bottom:8px;
  }

  .formula{
    font-family:'JetBrains Mono', monospace;
    font-size:1.15rem;
    font-weight:700;
    background:rgba(255,255,255,0.04);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:10px;
    direction:ltr;
    text-align:center;
    letter-spacing:1px;
    overflow-x:auto;
  }

  .vars{
    font-size:0.85rem;
    color:var(--chalk-dim);
    line-height:1.7;
    margin-bottom:8px;
  }
  .vars b{color:var(--chalk); font-weight:700;}

  .note{
    font-size:0.82rem;
    color:var(--chalk-dim);
    background:rgba(255,255,255,0.03);
    border-radius:8px;
    padding:8px 10px;
    line-height:1.6;
  }
  .note b{color:inherit;}

  .empty-state{
    text-align:center;
    color:var(--chalk-dim);
    padding:60px 20px;
    font-size:0.95rem;
    display:none;
  }
  .empty-state.show{display:block;}
  .empty-state .big{font-size:2.2rem; margin-bottom:10px;}

  footer{
    text-align:center;
    color:var(--chalk-dim);
    font-size:0.78rem;
    padding:20px;
    border-top:1px solid var(--line);
  }
</style>
</head>
<body>

<header>
  <h1>📐 قوانين الفيزياء</h1>
  <div class="sub">مرجع سريع لجميع القوانين مقسّمة حسب الفروع</div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="ابحث عن قانون... مثل: السرعة، القوة، الضغط">
    <span class="search-icon">🔍</span>
  </div>
</header>

<nav class="cats" id="catsNav"></nav>

<main id="mainContent"></main>

<div class="empty-state" id="emptyState">
  <div class="big">🤔</div>
  لم يتم العثور على نتائج مطابقة
</div>

<footer>
  مرجع تعليمي مبسّط — للاستخدام الصفي والمراجعة الذاتية
</footer>

<script>
const DATA = [
  {
    id:'motion',
    name:'الحركة',
    icon:'🏃',
    color:'var(--c-motion)',
    laws:[
      {name:'السرعة المتوسطة', formula:'v = Δx / Δt', vars:'v: السرعة (م/ث) — Δx: المسافة المقطوعة (م) — Δt: الزمن (ث)'},
      {name:'التسارع', formula:'a = Δv / Δt', vars:'a: التسارع (م/ث²) — Δv: التغيّر في السرعة — Δt: الزمن المستغرق'},
      {name:'معادلات الحركة المنتظمة', formula:'v = v₀ + a t\nx = v₀ t + ½ a t²\nv² = v₀² + 2 a x', vars:'v₀: السرعة الابتدائية — v: السرعة النهائية — a: التسارع — t: الزمن — x: المسافة'},
      {name:'السرعة الزاوية', formula:'ω = Δθ / Δt', vars:'ω: السرعة الزاوية (راد/ث) — θ: الزاوية (راديان) — t: الزمن'},
      {name:'القوة الجاذبة المركزية', formula:'Fc = m v² / r', vars:'Fc: القوة المركزية (N) — m: الكتلة (kg) — v: السرعة — r: نصف القطر (م)'},
      {name:'السقوط الحر', formula:'h = ½ g t²\nv = g t', vars:'h: ارتفاع السقوط (م) — g ≈ 9.8 م/ث² — t: زمن السقوط — v: السرعة عند السقوط'},
    ]
  },
  {
    id:'energy',
    name:'الطاقة والشغل',
    icon:'⚡',
    color:'var(--c-energy)',
    laws:[
      {name:'الشغل', formula:'W = F · d · cosθ', vars:'W: الشغل (جول J) — F: القوة (N) — d: الإزاحة (م) — θ: الزاوية بين القوة والإزاحة'},
      {name:'الطاقة الحركية', formula:'KE = ½ m v²', vars:'KE: الطاقة الحركية (J) — m: الكتلة (kg) — v: السرعة (م/ث)'},
      {name:'طاقة الوضع (الجذب)', formula:'PE = m g h', vars:'PE: طاقة الوضع (J) — m: الكتلة — g: تسارع الجذب — h: الارتفاع (م)'},
      {name:'القدرة', formula:'P = W / t = F · v', vars:'P: القدرة (واط W) — W: الشغل — t: الزمن — F: القوة — v: السرعة'},
      {name:'قانون حفظ الطاقة', formula:'E الكلية = ثابت\nKE₁ + PE₁ = KE₂ + PE₂', vars:'الطاقة الكلية لا تُفنى ولا تُستحدث، فقط تتحول من شكل لآخر'},
      {name:'الكفاءة', formula:'η = (الناتج / المدخل) × 100%', vars:'η: الكفاءة (%) — الناتج: الطاقة المفيدة — المدخل: الطاقة الكلية المستهلكة'},
    ]
  },
  {
    id:'newton',
    name:'القوة وقوانين نيوتن',
    icon:'🍎',
    color:'var(--c-motion)',
    laws:[
      {name:'قانون نيوتن الأول (القصور الذاتي)', formula:'إذا F = 0 → الجسم ساكن أو يتحرك بسرعة ثابتة', vars:'لا يتغير حال الجسم (سكون أو حركة منتظمة) إلا بقوة محصلة غير صفرية'},
      {name:'قانون نيوتن الثاني', formula:'F = m · a', vars:'F: القوة المحصلة (N) — m: الكتلة (kg) — a: التسارع (م/ث²)'},
      {name:'قانون نيوتن الثالث (الفعل ورد الفعل)', formula:'F₁₂ = -F₂₁', vars:'لكل فعل رد فعل مساوٍ له في المقدار ومضاد له في الاتجاه'},
      {name:'الوزن', formula:'W = m · g', vars:'W: الوزن (N) — m: الكتلة (kg) — g: تسارع الجذب الأرضي ≈ 9.8 م/ث²'},
      {name:'قوة الاحتكاك', formula:'f = μ · N', vars:'f: قوة الاحتكاك (N) — μ: معامل الاحتكاك — N: القوة العمودية (N)'},
      {name:'كمية الحركة (الزخم)', formula:'p = m · v', vars:'p: كمية الحركة (kg·m/s) — m: الكتلة — v: السرعة'},
      {name:'قانون حفظ كمية الحركة', formula:'m₁v₁ + m₂v₂ = m₁v₁′ + m₂v₂′', vars:'في التصادمات، إجمالي كمية الحركة قبل التصادم = إجمالي كمية الحركة بعده'},
    ]
  },
  {
    id:'light',
    name:'الضوء والبصريات',
    icon:'💡',
    color:'var(--c-light)',
    laws:[
      {name:'سرعة الضوء', formula:'c ≈ 3 × 10⁸ م/ث', vars:'c: سرعة الضوء في الفراغ'},
      {name:'قانون الانعكاس', formula:'زاوية السقوط = زاوية الانعكاس', vars:'تُقاس الزاويتان من الخط العمودي على السطح (الناظم)'},
      {name:'قانون الانكسار (سنل)', formula:'n₁ sinθ₁ = n₂ sinθ₂', vars:'n₁, n₂: معامل الانكسار للوسطين — θ₁: زاوية السقوط — θ₂: زاوية الانكسار'},
      {name:'معامل الانكسار', formula:'n = c / v', vars:'n: معامل الانكسار — c: سرعة الضوء في الفراغ — v: سرعة الضوء في الوسط'},
      {name:'معادلة العدسات (المرايا)', formula:'1/f = 1/d₀ + 1/dᵢ', vars:'f: البعد البؤري — d₀: بعد الجسم — dᵢ: بعد الصورة'},
      {name:'التكبير', formula:'M = -dᵢ/d₀ = hᵢ/h₀', vars:'M: قوة التكبير — h₀: ارتفاع الجسم — hᵢ: ارتفاع الصورة'},
      {name:'تردد وطول موجة الضوء', formula:'c = f · λ', vars:'c: سرعة الضوء — f: التردد (Hz) — λ: الطول الموجي (م)'},
    ]
  },
  {
    id:'sound',
    name:'الصوت والموجات',
    icon:'🔊',
    color:'var(--c-sound)',
    laws:[
      {name:'سرعة الموجة', formula:'v = f · λ', vars:'v: سرعة الموجة (م/ث) — f: التردد (Hz) — λ: الطول الموجي (م)'},
      {name:'العلاقة بين التردد والدور', formula:'f = 1/T', vars:'f: التردد (Hz) — T: الزمن الدوري (ث)'},
      {name:'سرعة الصوت في الهواء', formula:'v ≈ 343 م/ث (عند 20°C)', vars:'تزداد سرعة الصوت بارتفاع درجة الحرارة'},
      {name:'ظاهرة دوبلر (تقريبي)', formula:'f′ = f (v ± vₘ)/(v ± vₛ)', vars:'f′: التردد المُسمع — vₘ: سرعة المراقب — vₛ: سرعة المصدر — الإشارات تعتمد على اتجاه الحركة'},
      {name:'شدة الصوت', formula:'β = 10 log(I / I₀) dB', vars:'β: مستوى الشدة بالديسيبل — I: شدة الصوت — I₀: شدة العتبة المرجعية'},
    ]
  },
  {
    id:'heat',
    name:'الحرارة',
    icon:'🌡️',
    color:'var(--c-heat)',
    laws:[
      {name:'الكمية الحرارية (السعة الحرارية)', formula:'Q = m · c · ΔT', vars:'Q: الكمية الحرارية (J) — m: الكتلة (kg) — c: الحرارة النوعية — ΔT: التغير في درجة الحرارة'},
      {name:'الحرارة الكامنة (تغير الحالة)', formula:'Q = m · L', vars:'Q: الحرارة الكامنة (J) — m: الكتلة — L: الحرارة الكامنة النوعية (انصهار/تبخر)'},
      {name:'التمدد الطولي', formula:'ΔL = L₀ · α · ΔT', vars:'ΔL: التغير في الطول — L₀: الطول الأصلي — α: معامل التمدد الطولي — ΔT: التغير بالحرارة'},
      {name:'التحويل بين الدرجات', formula:'°F = (°C × 9/5) + 32\nK = °C + 273', vars:'تحويل بين سيلسيوس، فهرنهايت، وكلفن'},
      {name:'قانون الغاز المثالي', formula:'P V = n R T', vars:'P: الضغط — V: الحجم — n: عدد المولات — R: ثابت الغازات — T: درجة الحرارة (كلفن)'},
    ]
  },
  {
    id:'electricity',
    name:'الكهرباء',
    icon:'🔌',
    color:'var(--c-electric)',
    laws:[
      {name:'قانون أوم', formula:'V = I · R', vars:'V: فرق الجهد (فولت V) — I: شدة التيار (أمبير A) — R: المقاومة (أوم Ω)'},
      {name:'القدرة الكهربائية', formula:'P = V · I = I² R = V²/R', vars:'P: القدرة (واط W) — V: الجهد — I: التيار — R: المقاومة'},
      {name:'الطاقة الكهربائية', formula:'E = P · t', vars:'E: الطاقة (جول J أو كيلوواط.ساعة) — P: القدرة — t: الزمن'},
      {name:'المقاومة على التوالي', formula:'R_total = R₁ + R₂ + R₃ + ...', vars:'في التوصيل على التوالي، المقاومات تُجمع مباشرة'},
      {name:'المقاومة على التوازي', formula:'1/R_total = 1/R₁ + 1/R₂ + ...', vars:'في التوصيل على التوازي، مقلوب المقاومة الكلية = مجموع مقلوبات المقاومات'},
      {name:'قانون كولوم', formula:'F = k · (q₁ q₂)/r²', vars:'F: قوة التجاذب/التنافر (N) — k: ثابت كولوم — q₁,q₂: الشحنتان — r: المسافة بينهما'},
      {name:'الشحنة الكهربائية', formula:'Q = I · t', vars:'Q: الشحنة (كولوم C) — I: التيار (أمبير) — t: الزمن (ثانية)'},
    ]
  },
  {
    id:'magnetism',
    name:'المغناطيسية',
    icon:'🧲',
    color:'var(--c-mag)',
    laws:[
      {name:'القوة المغناطيسية على شحنة متحركة', formula:'F = q v B sinθ', vars:'F: القوة (N) — q: الشحنة — v: السرعة — B: شدة المجال المغناطيسي (تسلا) — θ: الزاوية بين v وB'},
      {name:'القوة على سلك يحمل تيارًا', formula:'F = B I L sinθ', vars:'F: القوة — B: المجال المغناطيسي — I: التيار — L: طول السلك في المجال'},
      {name:'القوة الدافعة الكهربائية المُحثة (فاراداي)', formula:'EMF = -N (ΔΦ/Δt)', vars:'EMF: القوة الدافعة المحثة — N: عدد اللفات — Φ: التدفق المغناطيسي — t: الزمن'},
    ]
  },
  {
    id:'fluids',
    name:'السوائل والضغط',
    icon:'🌊',
    color:'var(--c-fluid)',
    laws:[
      {name:'الضغط', formula:'P = F / A', vars:'P: الضغط (باسكال Pa) — F: القوة العمودية (N) — A: المساحة (م²)'},
      {name:'ضغط السائل عند عمق معين', formula:'P = ρ g h', vars:'P: الضغط — ρ: كثافة السائل — g: تسارع الجذب — h: العمق'},
      {name:'مبدأ باسكال', formula:'P₁ = P₂ → F₁/A₁ = F₂/A₂', vars:'الضغط المطبق ينتقل بالتساوي في جميع الاتجاهات داخل السائل المحصور'},
      {name:'مبدأ أرخميدس (قوة الطفو)', formula:'F_b = ρ_fluid · V_displaced · g', vars:'F_b: قوة الطفو — ρ: كثافة السائل — V: حجم السائل المُزاح — g: تسارع الجذب'},
      {name:'الكثافة', formula:'ρ = m / V', vars:'ρ: الكثافة (kg/m³) — m: الكتلة — V: الحجم'},
      {name:'معادلة الاستمرارية', formula:'A₁v₁ = A₂v₂', vars:'A: مساحة المقطع — v: سرعة السائل (في أنبوب غير متجانس)'},
    ]
  },
];

const catsNav = document.getElementById('catsNav');
const mainContent = document.getElementById('mainContent');
const emptyState = document.getElementById('emptyState');
const searchInput = document.getElementById('searchInput');

let activeCategory = 'all';

function buildNav(){
  const allBtn = document.createElement('button');
  allBtn.textContent = '🌟 الكل';
  allBtn.className = 'active';
  allBtn.dataset.cat = 'all';
  allBtn.style.background = '#eef1f5';
  catsNav.appendChild(allBtn);

  DATA.forEach(sec=>{
    const btn = document.createElement('button');
    btn.textContent = `${sec.icon} ${sec.name}`;
    btn.dataset.cat = sec.id;
    catsNav.appendChild(btn);
  });

  catsNav.addEventListener('click', e=>{
    const btn = e.target.closest('button');
    if(!btn) return;
    activeCategory = btn.dataset.cat;
    [...catsNav.children].forEach(b=>{
      b.classList.toggle('active', b===btn);
      b.style.background = (b===btn) ? '#eef1f5' : '';
      b.style.color = (b===btn) ? '#1c2230' : '';
    });
    render();
    if(activeCategory !== 'all'){
      const target = document.getElementById('sec-'+activeCategory);
      if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
    } else {
      window.scrollTo({top:0, behavior:'smooth'});
    }
  });
}

function render(){
  const query = searchInput.value.trim().toLowerCase();
  mainContent.innerHTML = '';
  let totalShown = 0;

  DATA.forEach(sec=>{
    if(activeCategory !== 'all' && activeCategory !== sec.id) return;

    const filteredLaws = sec.laws.filter(law=>{
      if(!query) return true;
      return law.name.toLowerCase().includes(query) ||
             law.formula.toLowerCase().includes(query) ||
             law.vars.toLowerCase().includes(query);
    });

    if(filteredLaws.length === 0) return;
    totalShown += filteredLaws.length;

    const section = document.createElement('section');
    section.className = 'section';
    section.id = 'sec-'+sec.id;

    section.innerHTML = `
      <div class="section-title">
        <span class="dot" style="background:${sec.color}"></span>
        <h2>${sec.icon} ${sec.name}</h2>
        <span class="count">${filteredLaws.length} قانون</span>
      </div>
      <div class="law-grid"></div>
    `;

    const grid = section.querySelector('.law-grid');
    filteredLaws.forEach(law=>{
      const card = document.createElement('div');
      card.className = 'law-card';
      card.style.borderRightColor = sec.color;
      card.innerHTML = `
        <div class="law-name">${law.name}</div>
        <div class="formula">${law.formula.replace(/\n/g,'<br>')}</div>
        <div class="vars">${law.vars}</div>
      `;
      grid.appendChild(card);
    });

    mainContent.appendChild(section);
  });

  emptyState.classList.toggle('show', totalShown===0);
}

searchInput.addEventListener('input', render);

buildNav();
render();
</script>
